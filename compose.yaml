services:
  app:
    image: node:22
    ports:
      - 4321:4321
    working_dir: /app
    command: >
      sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:4321').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    volumes:
      - ./:/app
      - /app/node_modules
